<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        h2 {
            color: #333;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏠 House Price Predictor</h2>

    <input type="number" id="rooms" placeholder="Number of Rooms"><br>
    <input type="number" id="distance" placeholder="Distance from City"><br>
    <input type="number" id="propertycount" placeholder="Property Count"><br>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
function predict() {
    let rooms = document.getElementById("rooms").value;
    let distance = document.getElementById("distance").value;
    let propertycount = document.getElementById("propertycount").value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            rooms: rooms,
            distance: distance,
            propertycount: propertycount
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerHTML = data.prediction;
    });
}
</script>

</body>
</html>
